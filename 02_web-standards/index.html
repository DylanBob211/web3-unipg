<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css">
</head>

<body>
  <header>
    <h1>Todo List</h1>
  </header>
  <main>
    <form>
      <label for="new-todo">
        Aggiungi un nuovo todo alla lista
      </label>
      <div class="form-field">
        <input id="new-todo" name="new-todo" placeholder="Cosa vuoi fare oggi?">
        <button aria-label="Aggiungi">+</button>
      </div>
    </form>
    <ul id="todo-list">
      <li>
        <label>
          <input type="checkbox">
          <span>
            Item 1
          </span>
        </label>
        <button aria-label="rimuovi">-</button>
      </li>
    </ul>
  </main>

  <script src="main.js" type="module">

  </script>
</body>

</html>
